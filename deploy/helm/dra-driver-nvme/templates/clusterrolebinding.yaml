{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "dra-driver-nvme.fullname" . }}
  labels:
    {{- include "dra-driver-nvme.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "dra-driver-nvme.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "dra-driver-nvme.serviceAccountName" . }}
  namespace: {{ include "dra-driver-nvme.namespace" . }}
{{- end }}
