{{- if eq .Values.platform "openshift" }}
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: {{ include "dra-driver-nvme.fullname" . }}
  labels:
    {{- include "dra-driver-nvme.labels" . | nindent 4 }}
allowPrivilegedContainer: true
allowHostDirVolumePlugin: true
allowHostNetwork: false
allowHostPID: false
allowHostIPC: false
allowHostPorts: false
readOnlyRootFilesystem: false
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
fsGroup:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
volumes:
- hostPath
- secret
- configMap
- projected
- downwardAPI
- emptyDir
users:
- system:serviceaccount:{{ include "dra-driver-nvme.namespace" . }}:{{ include "dra-driver-nvme.serviceAccountName" . }}
{{- end }}
