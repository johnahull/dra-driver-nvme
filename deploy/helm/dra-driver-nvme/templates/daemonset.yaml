apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "dra-driver-nvme.fullname" . }}
  namespace: {{ include "dra-driver-nvme.namespace" . }}
  labels:
    {{- include "dra-driver-nvme.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "dra-driver-nvme.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dra-driver-nvme.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "dra-driver-nvme.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      containers:
      - name: plugin
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
        - /nvme-kubeletplugin
        args:
        - --node-name=$(NODE_NAME)
        - --cdi-root={{ .Values.plugin.cdiRoot }}
        {{- range .Values.plugin.extraArgs }}
        - {{ . }}
        {{- end }}
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        {{- with .Values.plugin.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        securityContext:
          privileged: true
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: plugins-registry
          mountPath: /var/lib/kubelet/plugins_registry
        - name: plugins
          mountPath: /var/lib/kubelet/plugins/dra.nvme
        - name: cdi
          mountPath: {{ .Values.plugin.cdiRoot }}
        - name: dev
          mountPath: /dev
        - name: sys
          mountPath: /sys
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
      - name: plugins-registry
        hostPath:
          path: /var/lib/kubelet/plugins_registry
      - name: plugins
        hostPath:
          path: /var/lib/kubelet/plugins/dra.nvme
          type: DirectoryOrCreate
      - name: cdi
        hostPath:
          path: {{ .Values.plugin.cdiRoot }}
      - name: dev
        hostPath:
          path: /dev
      - name: sys
        hostPath:
          path: /sys
